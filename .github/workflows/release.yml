name: Release

on:
  push:
    tags: ["v*"]

jobs:
  # ── 质量门(同 CI) ──
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - run: cargo clippy -p gitcore --features serde -- -D warnings
      - run: cargo clippy -p gui --all-targets -- -D warnings
      - run: cargo clippy -p tui -- -D warnings
      - run: cargo fmt --all --check
      - run: cargo test -p gitcore

  svelte-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - name: Install & check
        run: |
          cd gui
          npm ci
          npx svelte-kit sync
          npx svelte-check --tsconfig ./tsconfig.json
          npx prettier --check "src/**/*.svelte"

  # ── 三平台构建 → 直接挂到 GitHub Release（不打 zip）──
  build:
    needs: [lint-test, svelte-check]
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # 清掉 cache 恢复的历次构建产物,避免旧版本 exe/dmg 被下方 glob 一起上传。
      - name: Clean stale bundles
        shell: bash
        run: rm -rf target/release/bundle

      - name: Build Tauri
        run: |
          cd gui
          npm ci
          npx tauri build --ci

      - name: Upload to Release (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          body: |
            > **macOS 用户**：首次打开提示「已损坏无法打开」是因为应用未签名。
            > 解决方法：打开终端，运行 `xattr -cr /Applications/gui.app` 后再打开即可。
            > 或右键点击 app → 打开 → 再点一次「打开」。
          files: target/release/bundle/dmg/*.dmg

      - name: Upload to Release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/nsis/*.exe
