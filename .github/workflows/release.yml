name: Release

on:
  push:
    tags: ["v*"]

jobs:
  # ── 质量门(同 CI) ──
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - run: cargo clippy -p gitcore --features serde -- -D warnings
      - run: cargo clippy -p gui --all-targets -- -D warnings
      - run: cargo fmt --all --check
      - run: cargo test -p gitcore

  svelte-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - name: Install & check
        run: |
          cd gui
          npm ci
          npx svelte-kit sync
          npx svelte-check --tsconfig ./tsconfig.json
          npx prettier --check "src/**/*.svelte"

  # ── 三平台构建 ──
  build:
    needs: [lint-test, svelte-check]
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clean stale bundles
        shell: bash
        run: rm -rf target/release/bundle

      - name: Build Tauri
        run: |
          cd gui
          npm ci
          npx tauri build --ci

      # ── 上传到 Release ──
      - name: Upload to Release (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v3
        with:
          body: |
            > **macOS 用户**：首次打开提示「已损坏无法打开」是因为应用未签名。
            > 解决方法：打开终端，运行 `xattr -cr /Applications/gui.app` 后再打开即可。
            > 或右键点击 app → 打开 → 再点一次「打开」。
          files: target/release/bundle/dmg/*.dmg

      - name: Upload to Release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v3
        with:
          files: target/release/bundle/nsis/*.exe

  # ── 更新 manifest:下载 Windows 安装包,签名,生成 latest.json ──
  manifest:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event.repository.private == false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install deps
        run: cd gui && npm ci

      - name: Download Windows installer from this release
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # GitHub release 可能还在创建中,稍等
          sleep 10
          gh release download "$TAG" --pattern "*x64-setup.exe" --dir assets 2>/dev/null || \
          gh release download "$TAG" --pattern "*.exe" --dir assets
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate latest.json
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          EXE=$(ls assets/*.exe 2>/dev/null | head -1)
          WIN_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/$(basename "$EXE")"

          # 签名 → 写文件避免 Shell 内联转义问题
          cd gui
          npx tauri signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            -p "" \
            "../$EXE" > ../win.sig 2>/dev/null || true
          cd ..

          # 用环境变量传值给 Node 脚本,避免内联注入
          export WIN_URL WIN_SIG VERSION
          WIN_SIG=$(cat win.sig 2>/dev/null || echo "")
          export WIN_SIG
          node scripts/build-manifest.mjs
          cat latest.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload manifest to Release
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release upload "$TAG" latest.json
        env:
          GH_TOKEN: ${{ github.token }}
